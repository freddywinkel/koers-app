<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Koers — een rustige cursus van 12 weken voor meer grip op je gevoelens." />
    <meta id="koers-color-scheme" name="color-scheme" content="light" />
    <meta id="koers-theme-color" name="theme-color" content="#F2F4F1" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Koers" />
    <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <title>Koers</title>
    <script>
      // Pas de bewaarde kleurmodus toe vóór de eerste weergave. Zo gebruikt
      // iOS niet kort de donkere systeemkleur voor een expliciet licht thema.
      (() => {
        const root = document.documentElement;
        const colors = {
          noordzeemist: { light: '#F2F4F1', dark: '#202826' },
          'zand-salie': { light: '#F7F3EC', dark: '#26211C' },
          'terracotta-linnen': { light: '#FAF5EE', dark: '#2B221C' }
        };
        // De app-instelling gebruikt 'systeem' als standaard. Houd dezelfde
        // standaard al vóór React/Dexie laden, zodat een eerste start op een
        // donker apparaat niet kort licht wordt (of de iOS-balk licht vastlegt).
        let mode = 'systeem';
        let design = 'noordzeemist';
        try {
          const savedMode = localStorage.getItem('koers-theme');
          const savedDesign = localStorage.getItem('koers-design');
          if (savedMode === 'systeem' || savedMode === 'licht' || savedMode === 'donker') mode = savedMode;
          if (savedDesign && Object.prototype.hasOwnProperty.call(colors, savedDesign)) design = savedDesign;
        } catch {
          // Opslag kan in een afgeschermde browsercontext geweigerd worden.
        }
        const dark = mode === 'donker' || (mode === 'systeem' && matchMedia('(prefers-color-scheme: dark)').matches);
        const activeScheme = dark ? 'dark' : 'light';
        root.style.colorScheme = activeScheme;
        root.classList.toggle('dark', dark);
        root.dataset.theme = design;
        document.getElementById('koers-color-scheme').content = activeScheme;
        document.getElementById('koers-theme-color').content = colors[design][dark ? 'dark' : 'light'];
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
