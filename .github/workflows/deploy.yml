name: Deploy naar GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Dependencies
        run: npm ci

      - name: Build (gh-pages base)
        run: npm run build:pages

      - name: Pages instellen
        uses: actions/configure-pages@v5

      - name: Artifact uploaden
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

      - name: Deployen
        id: deployment
        uses: actions/deploy-pages@v4
